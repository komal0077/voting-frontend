<div class="max-w-4xl mx-auto mt-10 sm:mt-14 px-4 grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-10">

  <!-- Form Card -->
  <section class="bg-black p-5 sm:p-6 md:p-8 rounded-lg text-white shadow-lg">

    <h2 class="text-lg sm:text-xl md:text-2xl font-bold text-orange-500 mb-4 text-center md:text-left">
      🏳️ Add Party
    </h2>

    <form (ngSubmit)="submit()" class="space-y-4">

      <div>
        <label class="block mb-1 text-sm sm:text-base">Party Name</label>
        <input type="text"
               [(ngModel)]="party.name"
               name="name"
               class="w-full p-2 sm:p-3 bg-gray-800 border border-orange-500 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-400">
      </div>

      <div>
        <label class="block mb-1 text-sm sm:text-base">Party Leader</label>
        <input type="text"
               [(ngModel)]="party.leader"
               name="leader"
               class="w-full p-2 sm:p-3 bg-gray-800 border border-orange-500 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-400">
      </div>

      <div>
        <label class="block mb-1 text-sm sm:text-base">Party Symbol (Image URL)</label>
        <input type="text"
               [(ngModel)]="party.symbol"
               name="symbol"
               class="w-full p-2 sm:p-3 bg-gray-800 border border-orange-500 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-400">
      </div>

      <button type="submit"
              class="bg-orange-600 hover:bg-orange-700 px-4 py-2 sm:py-3 rounded-lg font-bold w-full transition duration-300">
        ➕ Add Party
      </button>

    </form>

  </section>

  <!-- Image Card -->
  <section class="flex items-center justify-center">

    <img
      [src]="party.symbol || 'https://mir-s3-cdn-cf.behance.net/project_modules/source/b1ec3a22221593.5630eaa4b39b4.gif'"
      alt="Party Symbol"
      class="w-52 h-52 sm:w-64 sm:h-64 md:w-72 md:h-72 lg:w-80 lg:h-80 object-cover rounded-full shadow-xl border-4 border-orange-500"
    >

  </section>

</div>
