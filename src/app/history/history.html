<section class="min-h-screen bg-[#1c1b1b] text-white px-4 sm:px-6 md:px-8 py-8">

  <h2 class="text-2xl sm:text-3xl md:text-4xl font-bold text-orange-500 mb-6 text-center">
    🗂 Election History
  </h2>

  <p class="text-green-400 text-center mb-4 text-sm sm:text-base">
    {{ message }}
  </p>

  <!-- INPUT SECTION -->
  <div class="flex flex-col sm:flex-col md:flex-row items-stretch md:items-center gap-4 mb-6 justify-center max-w-4xl mx-auto">

    <input
      type="text"
      placeholder="Enter Year"
      [(ngModel)]="year"
      class="p-3 w-full md:w-1/3 bg-gray-800 border border-gray-700 rounded-xl outline-none focus:border-orange-500"
    />

    <input
      type="text"
      placeholder="Enter State"
      [(ngModel)]="state"
      class="p-3 w-full md:w-1/3 bg-gray-800 border border-gray-700 rounded-xl outline-none focus:border-orange-500"
    />

    <button
      (click)="save()"
      class="bg-orange-600 hover:bg-orange-700 text-white font-semibold px-6 py-3 rounded-xl shadow-lg transition-all w-full md:w-auto"
    >
      Save History
    </button>

  </div>

  <hr class="border-gray-700 mb-6" />

  <!-- TABLE -->
  <div class="overflow-x-auto rounded-xl border border-orange-700 shadow-lg">

    <table class="min-w-full bg-gray-900 text-left text-sm sm:text-base">

      <thead>
        <tr class="text-orange-400 border-b border-gray-700">
          <th class="p-3 sm:p-4">ID</th>
          <th class="p-3 sm:p-4">Year</th>
          <th class="p-3 sm:p-4">State</th>
          <th class="p-3 sm:p-4">Winner</th>
          <th class="p-3 sm:p-4">Party</th>
          <th class="p-3 sm:p-4">Action</th>
        </tr>
      </thead>

      <tbody>

        <tr
          *ngFor="let h of histories"
          class="border-b border-gray-700 hover:bg-gray-800 transition-all"
        >

          <td class="p-3 sm:p-4">{{ h.id }}</td>
          <td class="p-3 sm:p-4">{{ h.year }}</td>
          <td class="p-3 sm:p-4">{{ h.state }}</td>
          <td class="p-3 sm:p-4">{{ h.winnerCandidate }}</td>
          <td class="p-3 sm:p-4 text-orange-300">{{ h.winningParty }}</td>

          <td class="p-3 sm:p-4">
            <button
              (click)="deleteHistory(h.id)"
              class="bg-red-600 hover:bg-red-700 px-3 sm:px-4 py-2 rounded-lg text-white font-semibold transition-all text-xs sm:text-sm"
            >
              Delete
            </button>
          </td>

        </tr>

      </tbody>

    </table>

  </div>

</section>
