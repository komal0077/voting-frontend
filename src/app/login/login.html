<section class="min-h-screen flex flex-col md:flex-row items-center justify-center
bg-[#1c1b1b] text-white px-4 sm:px-6 py-10">

  <!-- LEFT IMAGE SECTION
  <div class="flex justify-center md:w-1/2 mb-8 md:mb-0">
    <img
      src="https://images.unsplash.com/photo-1509822929063-6b6cfc9b42f2?w=600&auto=format&fit=crop&q=60"
      alt="Login Image"
      class="w-40 h-40 sm:w-56 sm:h-56 md:w-72 md:h-72 lg:w-80 lg:h-80
      object-cover rounded-full shadow-2xl border-4 border-orange-500"
    >
  </div> -->

  <!-- RIGHT LOGIN FORM -->
  <div class="flex justify-center md:w-1/2 w-full">
    <div class="w-full max-w-md bg-gray-900 border border-orange-500
    rounded-3xl p-6 sm:p-8 md:p-10 shadow-2xl hover:shadow-orange-500/30 transition-all">

      <h2 class="text-2xl sm:text-3xl font-bold text-orange-500 text-center mb-6 sm:mb-8">
        🗳️ Login
      </h2>

      <form (ngSubmit)="login()" #loginForm="ngForm" class="space-y-5">

        <!-- Username -->
        <div>
          <label class="block text-gray-300 mb-1 text-sm sm:text-base">Username</label>
          <input
            type="text"
            name="username"
            [(ngModel)]="user.username"
            required
            placeholder="Enter your username"
            class="w-full p-3 rounded-xl bg-gray-800 border border-orange-500
            focus:outline-none focus:ring-2 focus:ring-orange-400 text-white"
          >
        </div>

        <!-- Password -->
        <div>
          <label class="block text-gray-300 mb-1 text-sm sm:text-base">Password</label>
          <input
            type="password"
            name="password"
            [(ngModel)]="user.password"
            required
            placeholder="Enter your password"
            class="w-full p-3 rounded-xl bg-gray-800 border border-orange-500
            focus:outline-none focus:ring-2 focus:ring-orange-400 text-white"
          >
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          [disabled]="!loginForm.form.valid"
          class="w-full py-3 bg-orange-500 hover:bg-orange-600 text-black
          font-bold rounded-xl transition-all duration-300 hover:scale-105 shadow-lg"
        >
          Login
        </button>

      </form>

      <!-- Register Link -->
      <p class="mt-6 text-gray-400 text-center text-xs sm:text-sm">
        Don't have an account?
        <a routerLink="/register" class="text-orange-500 hover:underline ml-1">
          Register here
        </a>
      </p>

    </div>
  </div>

</section>
